services:
  guardian-backend:
    build:
      context: ./docker
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./person_photos:/app/person_photos
      - ./models:/app/custom_models
    environment:
      - PERSON_PHOTOS_DIR=/app/person_photos
      - MODELS_DIR=/app/custom_models
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-DataBase}
    restart: unless-stopped